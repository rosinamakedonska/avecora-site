kind = "web"
previewPath = "/"
title = "ACORA Diagnostic Entry"
version = "1.0.0"
id = "artifacts/acora"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20858

[services.development]
run = "pnpm --filter @workspace/acora run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/acora", "run", "build" ]
publicDir = "artifacts/acora/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20858"
BASE_PATH = "/"
